<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>看板比對系統</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@400;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #eef2f7;
      --surface: #e2e8f0;
      --card:    #ffffff;
      --border:  #b8c8db;
      --text:    #0f1a2e;
      --muted:   #5a7490;
      --cyan:    #0088bb;
      --green:   #00a855;
      --red:     #e8001a;
      --orange:  #e05a00;
      --amber:   #c87800;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      /* Dot grid background */
      background-image: radial-gradient(circle, #b8c8db 1px, transparent 1px);
      background-size: 28px 28px;
    }

    .hidden { display: none !important; }

    /* ── Scanner input ─────────────────────── */
    #barcode-input {
      position: fixed; top: -9999px; left: -9999px;
      opacity: 0; width: 1px; height: 1px;
    }

    /* ── Flash overlay ─────────────────────── */
    #flash-overlay {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 200;
      opacity: 0; transition: opacity 0.15s;
    }

    /* ═══════════════════════════════════════════
       HEADER
    ═══════════════════════════════════════════ */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: rgba(255,255,255,0.95);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px);
      position: sticky; top: 0; z-index: 10;
      flex-wrap: wrap;
    }

    @media (max-width: 640px) {
      header { gap: 8px; padding: 8px 12px; }
      #status-card { padding: 12px 16px; gap: 4px; }
      #status-msg { font-size: 1.4rem; letter-spacing: 0; }
      #status-sub { font-size: 0.7rem; letter-spacing: 0; }
      .status-eyebrow { display: none; }
      #btn-reset { padding: 7px 12px; font-size: 0.8rem; }
    }

    .logo {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700; font-size: 1.15rem;
      color: var(--text);
      letter-spacing: 1px;
      text-transform: uppercase;
      white-space: nowrap;
      text-decoration: none;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: var(--cyan);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-icon svg { display: block; }
    .logo-text { display: flex; flex-direction: column; line-height: 1.1; }
    .logo-text-main { font-size: 1rem; font-weight: 700; color: var(--text); letter-spacing: 2px; }
    .logo-text-sub  { font-size: 0.6rem; font-weight: 600; color: var(--muted); letter-spacing: 3px; }

    .divider { width: 1px; height: 32px; background: var(--border); flex-shrink: 0; }

    /* Reference number pill */
    .ref-pill {
      flex: 1;
      display: flex; align-items: center; gap: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 18px;
      min-width: 0;
    }
    .ref-pill-label {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.7rem; font-weight: 600;
      color: var(--muted); text-transform: uppercase; letter-spacing: 2px;
      white-space: nowrap;
    }
    #ref-display {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700; font-size: 1.3rem;
      color: var(--cyan); letter-spacing: 3px;
      flex: 1; truncate: ellipsis; overflow: hidden;
      white-space: nowrap; text-overflow: ellipsis;
    }
    #ref-display.empty { color: var(--muted); font-size: 0.9rem; font-weight: 400; letter-spacing: 1px; font-family: 'DM Sans', sans-serif; }

    /* Scan counter */
    .scan-counter {
      display: flex; flex-direction: column; align-items: center;
      font-family: 'Rajdhani', sans-serif;
    }
    .scan-counter-val {
      font-size: 1.5rem; font-weight: 700; color: var(--text);
      line-height: 1;
    }
    .scan-counter-lbl {
      font-size: 0.6rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase;
    }

    /* Reset button */
    #btn-reset {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 16px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.85rem; font-weight: 600;
      letter-spacing: 1px; cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    #btn-reset:hover { border-color: var(--red); color: var(--red); }

    /* Lang dropdown */
    .lang-dropdown { position:relative; }
    .lang-trigger {
      display:flex; align-items:center; gap:5px;
      padding:7px 12px; border-radius:8px;
      border:1px solid var(--border); background:transparent;
      color:var(--text); font-family:'Rajdhani',sans-serif;
      font-size:0.8rem; font-weight:700; letter-spacing:1px;
      cursor:pointer; transition:all .2s; white-space:nowrap;
    }
    .lang-trigger:hover { border-color:var(--cyan); color:var(--cyan); }
    .lang-trigger svg { flex-shrink:0; transition: transform .2s; }
    .lang-dropdown.open .lang-trigger svg { transform: rotate(180deg); }
    .lang-menu {
      display:none; position:absolute; top:calc(100% + 6px); right:0;
      background:var(--card); border:1px solid var(--border);
      border-radius:10px; overflow:hidden; z-index:50;
      box-shadow:0 8px 24px rgba(0,0,0,0.12);
      min-width:120px;
    }
    .lang-dropdown.open .lang-menu { display:block; }
    .lang-option {
      display:flex; align-items:center; gap:8px;
      padding:10px 16px; cursor:pointer;
      font-family:'Rajdhani',sans-serif; font-size:0.85rem; font-weight:600;
      color:var(--text); letter-spacing:1px;
      transition:background .15s;
      border:none; background:none; width:100%; text-align:left;
    }
    .lang-option:hover { background:var(--surface); }
    .lang-option.active { color:var(--cyan); }
    .lang-option .lang-flag { font-size:1.1rem; }

    /* Mobile header */
    @media (max-width: 640px) {
      .ref-pill { display:none; }
      .divider  { display:none; }
      #qr-link  { display:none; }
      .logo-text-sub { display:none; }
      .scan-counter { display:flex !important; }
    }

    /* ═══════════════════════════════════════════
       MAIN
    ═══════════════════════════════════════════ */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px 28px;
      gap: 20px;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── Status card ───────────────────────── */
    #status-card {
      border: 2px solid var(--border);
      border-radius: 16px;
      background: var(--card);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 56px 40px;
      gap: 12px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
    }

    /* Scanline idle animation */
    #status-card::before {
      content: '';
      position: absolute;
      top: -40%; left: 0; right: 0;
      height: 40%;
      background: linear-gradient(to bottom, transparent, rgba(0,136,187,0.06), transparent);
      animation: scanline 3s linear infinite;
    }
    @keyframes scanline {
      0%   { top: -40%; }
      100% { top: 140%; }
    }

    #status-card.state-set {
      border-color: var(--cyan);
      box-shadow: 0 0 30px rgba(0,136,187,0.15), inset 0 0 40px rgba(0,136,187,0.05);
    }
    #status-card.state-ok {
      border-color: var(--green);
      box-shadow: 0 0 30px rgba(0,168,85,0.2), inset 0 0 40px rgba(0,168,85,0.06);
      animation: ok-pulse 0.4s ease-out;
    }
    @keyframes ok-pulse {
      0%   { box-shadow: 0 0 60px rgba(0,168,85,0.4); }
      100% { box-shadow: 0 0 30px rgba(0,168,85,0.2); }
    }
    #status-card.state-idle { border-color: var(--border); box-shadow: none; }

    .status-eyebrow {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.7rem; font-weight: 600;
      letter-spacing: 4px; text-transform: uppercase;
      color: var(--muted);
    }
    #status-msg {
      font-family: 'Rajdhani', sans-serif;
      font-size: 3.5rem; font-weight: 700;
      line-height: 1; letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text);
      transition: color 0.2s;
    }
    #status-msg.state-set   { color: var(--cyan); }
    #status-msg.state-ok    { color: var(--green); }
    #status-msg.state-idle  { color: var(--muted); }

    #status-sub {
      font-size: 0.95rem; color: var(--muted);
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: 1px;
    }

    /* ── Counter panels ────────────────────── */
    .counters {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .counter-panel {
      border: 2px solid var(--border);
      border-radius: 12px;
      background: var(--card);
      padding: 28px 32px;
      position: relative;
      overflow: hidden;
    }
    .counter-panel.internal { border-color: rgba(0,136,187,0.35); }
    .counter-panel.customer { border-color: rgba(224,90,0,0.35); }

    .counter-label {
      display: flex; align-items: center; gap: 8px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.8rem; font-weight: 600;
      letter-spacing: 3px; text-transform: uppercase;
      margin-bottom: 12px;
    }
    .counter-label.internal { color: var(--cyan); }
    .counter-label.customer { color: var(--orange); }

    .counter-dot {
      width: 6px; height: 6px; border-radius: 50%;
    }
    .internal .counter-dot { background: var(--cyan); box-shadow: 0 0 8px var(--cyan); }
    .customer .counter-dot { background: var(--orange); box-shadow: 0 0 8px var(--orange); }

    .counter-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 5rem; font-weight: 800;
      line-height: 1;
      transition: transform 0.1s;
    }
    .internal .counter-num { color: var(--cyan); }
    .customer .counter-num { color: var(--orange); }

    .counter-ghost {
      position: absolute;
      right: -10px; bottom: -20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10rem; font-weight: 800;
      opacity: 0.04; line-height: 1;
      pointer-events: none; user-select: none;
    }
    .internal .counter-ghost { color: var(--cyan); }
    .customer .counter-ghost { color: var(--orange); }

    /* ── History ───────────────────────────── */
    .history-panel {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--card);
      overflow: hidden;
    }
    .history-head {
      padding: 12px 20px;
      background: rgba(184,200,219,0.3);
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .history-head-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.75rem; font-weight: 600;
      letter-spacing: 3px; text-transform: uppercase;
      color: var(--muted);
    }
    table {
      width: 100%; border-collapse: collapse;
    }
    thead th {
      padding: 8px 20px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.65rem; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted);
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    tbody tr {
      border-bottom: 1px solid rgba(184,200,219,0.8);
      transition: background 0.15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(184,200,219,0.3); }
    td {
      padding: 8px 20px;
      font-size: 0.85rem;
    }
    .td-time { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--muted); }
    .td-product { font-family: 'JetBrains Mono', monospace; font-weight: 700; letter-spacing: 1px; }
    .td-result { text-align: right; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 0.9rem; letter-spacing: 1px; }

    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.65rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    }
    .badge-i { background: rgba(0,136,187,0.1); color: var(--cyan); border: 1px solid rgba(0,136,187,0.3); }
    .badge-c { background: rgba(224,90,0,0.1); color: var(--orange); border: 1px solid rgba(224,90,0,0.3); }

    .res-ok    { color: var(--green); }
    .res-set   { color: var(--cyan); }
    .res-error { color: var(--red); }

    /* ── Status bar ────────────────────────── */
    footer {
      background: rgba(255,255,255,0.95);
      border-top: 1px solid var(--border);
      padding: 5px 28px;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.65rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
    }
    .footer-right { display: flex; align-items: center; gap: 16px; }
    #status-dot-text::before {
      content: '●';
      color: var(--green);
      margin-right: 5px;
      animation: blink 2s infinite;
    }
    @keyframes blink { 50% { opacity: 0.3; } }

    /* ═══════════════════════════════════════════
       ALERT VIEW
    ═══════════════════════════════════════════ */
    #alert-view {
      position: fixed; inset: 0; z-index: 100;
      background: #0d0003;
      display: flex; flex-direction: column;
      animation: alert-in 0.2s ease-out;
    }
    @keyframes alert-in {
      from { opacity: 0; transform: scale(1.02); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* Pulsing red radial */
    #alert-view::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, rgba(255,23,68,0.25) 0%, transparent 70%);
      animation: alert-pulse 1.2s ease-in-out infinite alternate;
      pointer-events: none;
    }
    @keyframes alert-pulse {
      from { opacity: 0.5; }
      to   { opacity: 1; }
    }

    .alert-header {
      padding: 16px 40px;
      border-bottom: 1px solid rgba(255,23,68,0.3);
      display: flex; align-items: center; gap: 12px;
      position: relative;
    }
    .alert-header-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.8rem; font-weight: 700;
      letter-spacing: 4px; text-transform: uppercase;
      color: rgba(255,100,120,0.8);
    }
    .alert-blink {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 12px var(--red);
      animation: blink 0.6s infinite;
    }

    .alert-main {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px 16px;
      gap: 24px;
      position: relative;
      overflow-y: auto;
    }

    .alert-headline {
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(2.5rem, 10vw, 5rem); font-weight: 700;
      color: var(--red);
      letter-spacing: 4px; text-transform: uppercase;
      text-align: center;
      text-shadow: 0 0 40px rgba(255,23,68,0.6);
    }

    .alert-codes {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      width: 100%; max-width: 600px;
    }
    .alert-code-box {
      border: 2px solid;
      border-radius: 12px;
      padding: 16px 20px;
      text-align: center;
      width: 100%;
    }
    .alert-code-box.expected {
      border-color: rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.08);
    }
    .alert-code-box.wrong {
      border-color: rgba(255,23,68,0.5);
      background: rgba(255,23,68,0.08);
    }
    .alert-code-label {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.7rem; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase;
      margin-bottom: 8px;
    }
    .expected .alert-code-label { color: rgba(255,255,255,0.4); }
    .wrong .alert-code-label    { color: var(--red); }
    .alert-code-val {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: clamp(1.2rem, 5vw, 2rem);
      letter-spacing: 2px;
      word-break: break-all;
    }
    .expected .alert-code-val { color: #e8edf5; }
    .wrong .alert-code-val    { color: var(--red); text-shadow: 0 0 20px rgba(255,23,68,0.5); }

    .alert-vs {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.2rem; font-weight: 700;
      color: var(--muted); letter-spacing: 2px;
    }

    #btn-resolve {
      padding: 16px 32px;
      width: 100%; max-width: 600px;
      background: transparent;
      border: 2px solid rgba(255,23,68,0.5);
      border-radius: 10px;
      color: var(--red);
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(0.9rem, 4vw, 1.2rem); font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    #btn-resolve:hover {
      background: rgba(255,23,68,0.1);
      border-color: var(--red);
      box-shadow: 0 0 30px rgba(255,23,68,0.2);
    }
    #btn-resolve:active { transform: scale(0.97); }

    @media (max-width: 640px) {
      .alert-header { padding: 12px 16px; }
      .alert-header-title { font-size: 0.7rem; letter-spacing: 2px; }
    }
  </style>
</head>

<body>
  <input id="barcode-input" type="password" lang="en" spellcheck="false" autocomplete="off" inputmode="none" />
  <div id="flash-overlay"></div>

  <!-- ════════ MAIN VIEW ════════ -->
  <div id="main-view">
    <header>
      <!-- Logo -->
      <div class="logo">
        <div class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <rect x="2" y="4" width="2" height="12" fill="white"/>
            <rect x="5" y="4" width="1" height="12" fill="white"/>
            <rect x="7" y="4" width="3" height="12" fill="white"/>
            <rect x="11" y="4" width="1" height="12" fill="white"/>
            <rect x="13" y="4" width="2" height="12" fill="white"/>
            <rect x="16" y="4" width="1" height="12" fill="white"/>
          </svg>
        </div>
        <div class="logo-text">
          <span class="logo-text-main" id="t-logo">看板比對</span>
          <span class="logo-text-sub">KANBAN SCAN</span>
        </div>
      </div>

      <div class="divider"></div>

      <!-- 基準料號（桌機顯示） -->
      <div class="ref-pill">
        <span class="ref-pill-label" id="t-refLabel">基準料號</span>
        <span id="ref-display" class="empty">---</span>
      </div>

      <!-- 已掃張數 -->
      <div class="scan-counter">
        <span class="scan-counter-val" id="scan-count">0</span>
        <span class="scan-counter-lbl" id="t-scanLbl">已掃張數</span>
      </div>

      <div class="divider"></div>

      <button id="btn-reset">⟳ 重置</button>

      <a id="qr-link" href="qr-gen.html" style="padding:7px 14px;border:1px solid rgba(0,136,187,0.4);
         border-radius:8px;color:var(--cyan);font-family:'Rajdhani',sans-serif;font-size:0.8rem;
         font-weight:700;letter-spacing:2px;text-transform:uppercase;text-decoration:none;
         white-space:nowrap;transition:all .2s;"
         onmouseover="this.style.background='rgba(0,136,187,0.1)'"
         onmouseout="this.style.background=''">QR →</a>

      <!-- 語言選單 dropdown -->
      <div class="lang-dropdown" id="lang-dropdown">
        <button class="lang-trigger" id="lang-trigger" onclick="toggleLangMenu()">
          <span id="lang-current-label">中文</span>
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M2 4l4 4 4-4"/>
          </svg>
        </button>
        <div class="lang-menu">
          <button class="lang-option active" id="lang-opt-zh" onclick="selectLang('zh','中文')">
            <span class="lang-flag">🇹🇼</span> 中文
          </button>
          <button class="lang-option" id="lang-opt-vi" onclick="selectLang('vi','Tiếng Việt')">
            <span class="lang-flag">🇻🇳</span> Tiếng Việt
          </button>
          <button class="lang-option" id="lang-opt-id" onclick="selectLang('id','Indonesia')">
            <span class="lang-flag">🇮🇩</span> Indonesia
          </button>
        </div>
      </div>
    </header>

    <main>
      <!-- Counter panels -->
      <div class="counters">
        <div class="counter-panel internal">
          <div class="counter-label internal">
            <span class="counter-dot"></span><span id="t-internalLabel">場內看板</span>
          </div>
          <div class="counter-num" id="count-internal">0</div>
          <div class="counter-ghost" id="ghost-internal">0</div>
        </div>
        <div class="counter-panel customer">
          <div class="counter-label customer">
            <span class="counter-dot"></span><span id="t-customerLabel">客戶看板</span>
          </div>
          <div class="counter-num" id="count-customer">0</div>
          <div class="counter-ghost" id="ghost-customer">0</div>
        </div>
      </div>

    let currentLang = localStorage.getItem('ray-lang') || 'zh';
    const t = k => (LANGS[currentLang] || LANGS.zh)[k] || k;

    function applyLang(lang) {
      currentLang = lang;
      try { localStorage.setItem('ray-lang', lang); } catch(e) {}
      const L = LANGS[lang];
      // Update language buttons
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.toLowerCase() === lang ||
          (lang === 'zh' && btn.textContent === '中文'));
      });
      // Update static elements
      const ids = ['logo','refLabel','scanLbl','internalLabel','customerLabel',
                   'historyTitle','historyRecent','thTime','thType','thCode','thResult',
                   'scannerLocked','alertTitle','alertHeadline','alertExpectedLabel',
                   'alertWrongLabel','alertResolve','alertActualLabel','alertExpectedQtyLabel',
                   'alertNewProductLabel','btnSwitchConfirm'];
      ids.forEach(k => { const el = document.getElementById('t-'+k); if(el) el.textContent = L[k]; });
      document.getElementById('btn-reset').innerHTML =
        `${L.resetBtn} <span style="opacity:.5;font-size:.8em">ESC</span>`;
      document.getElementById('qr-link').textContent = L.qrLink;
      // Update current state text
      if (!state.ref) {
        Els.refDisplay.textContent = L.refEmpty;
        Els.dotText.textContent    = L.sysReady;
        setCard('idle', L.statusIdle, L.statusIdleSub, 'STANDBY');
        if (Els.historyBody.querySelector('[colspan]'))
          Els.historyBody.innerHTML = `<tr><td colspan="4" style="padding:24px;text-align:center;color:var(--muted);font-style:italic">${L.historyEmpty}</td></tr>`;
      }
    }
    // ─────────────────────────────────────────────────────

    const state = { ref: null, total: 0, countInternal: 0, countCustomer: 0,
                    expectedQty: null, pendingSwitch: null, scannedSerials: new Set(),
                    scanLogs: [] };

    const el  = id => document.getElementById(id);
    const Els = {
      input:         el('barcode-input'),
      mainView:      el('main-view'),
      alertView:     el('alert-view'),
      statusCard:    el('status-card'),
      statusMsg:     el('status-msg'),
      statusSub:     el('status-sub'),
      statusEyebrow: el('status-eyebrow'),
      refDisplay:    el('ref-display'),
      scanCount:     el('scan-count'),
      countInternal: el('count-internal'),
      countCustomer: el('count-customer'),
      ghostInternal: el('ghost-internal'),
      ghostCustomer: el('ghost-customer'),
      historyBody:   el('scan-history'),
      lastRaw:       el('last-raw'),
      dotText:       el('status-dot-text'),
      alertExpected: el('alert-expected'),
      alertScanned:  el('alert-scanned'),
      flashOverlay:  el('flash-overlay'),
    };

    // ── IME 轉換 ─────────────────────────────────────────
    function toHalf(str) {
      return str.replace(/[\uff01-\uff5e]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xfee0))
                .replace(/\u3000/g, ' ');
    }

    // ── 料號擷取 ─────────────────────────────────────────
    function extractProduct(raw) {
      const s = toHalf(raw).trim();
      if (s.includes('J004')) {
        const m = s.match(/\sE(.{15})(.{12})/);
        const qm = s.match(/\s(\d{6})\w?\s*$/);
        const qty = qm ? parseInt(qm[1], 10) : null;
        if (m) return { kind: 'customer', product: m[2], qty };
        return { kind: 'customer', product: null, qty: null };
      }
      if (INTERNAL_PREFIX && s.startsWith(INTERNAL_PREFIX)) {
        const body = s.slice(INTERNAL_PREFIX.length).trim();
        const dashIdx = body.lastIndexOf('-');
        if (dashIdx > 0)
          return { kind: 'internal', product: body.slice(0, dashIdx), qty: null, serial: body.slice(dashIdx + 1) };
        return { kind: 'internal', product: body, qty: null, serial: null };
      }
      return { kind: 'internal', product: s, qty: null, serial: null };
    }

    // ── 主處理 ────────────────────────────────────────────
    function handleScan(raw) {
      Els.lastRaw.textContent = raw.length > 50 ? raw.slice(0, 50) + '…' : raw;

      if (/[\u4E00-\u9FFF\u3100-\u312F]/.test(raw)) {
        flash('rgba(255,171,0,0.25)');
        return;
      }

      const { kind, product, qty, serial } = extractProduct(raw);
      const kindLabel = kind === 'customer' ? t('kindCustomer') : t('kindInternal');

      if (!product) {
        setCard('idle', t('noExtract'), `${raw.slice(0, 30)}`, 'ERROR');
        beep('error'); return;
      }

      if (state.ref === null) {
        startNewBatch(product, kind, kindLabel, qty, 'ok', raw);
      } else if (product === state.ref) {
        // 重複序號檢查
        if (serial && state.scannedSerials.has(serial)) {
          addHistory(product, kindLabel, kind, 'error', raw);
          beep('error');
          triggerDuplicateAlert(serial);
          return;
        }
        // 只有正確才計數
        state.total++;
        if (serial) state.scannedSerials.add(serial);
        updateCountDisplay(kind);
        const suffix = t('kindSuffix') ? `${kindLabel}${t('kindSuffix')}` : kindLabel;
        const progress = state.expectedQty ? ` (${state.total}/${state.expectedQty})` : '';
        setCard('ok', t('matchOk'), `${suffix} · ${product}${progress}`, 'MATCH OK');
        Els.scanCount.textContent = state.expectedQty
          ? `${state.total}/${state.expectedQty}` : state.total;
        addHistory(product, kindLabel, kind, 'ok', raw);
        beep('ok');
      } else {
        // 不同番號出現 — 場內張數必須等於客戶張數才能換批
        if (state.countInternal !== state.countCustomer) {
          // 兩邊不一致，跳警告
          addHistory(product, kindLabel, kind, 'error', raw);
          beep('error');
          state.pendingSwitch = { product, kind, kindLabel, qty };
          triggerSwitchAlert(state.countInternal, state.countCustomer, product);
        } else {
          // 兩邊一致，自動換批次
          startNewBatch(product, kind, kindLabel, qty, 'batch', raw);
        }
      }
    }

    // ── 狀態卡 ────────────────────────────────────────────
    function setCard(st, msg, sub, eyebrow) {
      Els.statusCard.className = `state-${st}`;
      Els.statusMsg.className = `state-${st}`;
      Els.statusMsg.textContent = msg;
      Els.statusSub.textContent = sub || '';
      Els.statusEyebrow.textContent = eyebrow || '';
    }

    function bumpCounter(el) {
      el.style.transform = 'scale(1.15)';
      setTimeout(() => { el.style.transform = ''; }, 120);
    }

    function updateCountDisplay(kind) {
      if (kind === 'internal') {
        state.countInternal++;
        Els.countInternal.textContent = state.countInternal;
        Els.ghostInternal.textContent = state.countInternal;
        bumpCounter(Els.countInternal);
      } else {
        state.countCustomer++;
        Els.countCustomer.textContent = state.countCustomer;
        Els.ghostCustomer.textContent = state.countCustomer;
        bumpCounter(Els.countCustomer);
      }
    }

    function startNewBatch(product, kind, kindLabel, qty, sound = 'ok', raw = '') {
      state.ref = product;
      state.expectedQty = qty;
      state.scannedSerials = new Set();
      // 兩邊歸零
      state.total = 0; state.countInternal = 0; state.countCustomer = 0;
      Els.countInternal.textContent = '0'; Els.ghostInternal.textContent = '0';
      Els.countCustomer.textContent = '0'; Els.ghostCustomer.textContent = '0';
      Els.refDisplay.textContent = product;
      Els.refDisplay.classList.remove('empty');
      // 第一張計入 1
      state.total = 1;
      updateCountDisplay(kind);
      Els.scanCount.textContent = '1';
      Els.dotText.textContent = t('comparing');
      const suffix = t('kindSuffix') ? `${kindLabel}${t('kindSuffix')}` : kindLabel;
      setCard('set', t('refSet'), `${suffix} · ${product}`, 'LOCKED');
      addHistory(product, kindLabel, kind, 'set', raw);
      if (sound === 'batch') beepBatchComplete(); else beep('ok');
    }

    // ── 警報 ──────────────────────────────────────────────
    let alertSoundInterval = null;

    function triggerAlert(wrongProduct) {
      document.getElementById('alert-codes-mismatch').style.display = '';
      document.getElementById('alert-codes-switch').style.display   = 'none';
      document.getElementById('alert-new-product-row').style.display = 'none';
      document.getElementById('btn-switch-confirm').style.display   = 'none';
      document.getElementById('t-alertResolve').textContent = t('alertResolve');
      document.getElementById('t-alertTitle').textContent   = t('alertTitle');
      document.getElementById('t-alertHeadline').textContent = t('alertHeadline');
      Els.alertExpected.textContent = state.ref;
      Els.alertScanned.textContent  = wrongProduct;
      Els.alertView.classList.remove('hidden');
      Els.mainView.classList.add('hidden');
      stopAlertSound();
      playAlertSound();
      alertSoundInterval = setInterval(playAlertSound, 2000);
    }

    function triggerSwitchAlert(actual, expected, newProduct) {
      document.getElementById('alert-codes-mismatch').style.display  = 'none';
      document.getElementById('alert-codes-switch').style.display    = '';
      document.getElementById('alert-new-product-row').style.display = '';
      document.getElementById('btn-switch-confirm').style.display    = '';
      document.getElementById('t-alertResolve').textContent    = t('alertResolveSwitch');
      document.getElementById('t-alertTitle').textContent      = t('alertSwitchTitle');
      document.getElementById('t-alertHeadline').textContent   = t('alertSwitchHeadline');
      document.getElementById('alert-actual-count').textContent   = actual;
      document.getElementById('alert-expected-count').textContent = expected;
      document.getElementById('alert-new-product-val').textContent = newProduct;
      Els.alertView.classList.remove('hidden');
      Els.mainView.classList.add('hidden');
      stopAlertSound();
      playAlertSound();
      alertSoundInterval = setInterval(playAlertSound, 2000);
    }

    function triggerDuplicateAlert(serial) {
      document.getElementById('alert-codes-mismatch').style.display = '';
      document.getElementById('alert-codes-switch').style.display   = 'none';
      document.getElementById('alert-new-product-row').style.display = 'none';
      document.getElementById('btn-switch-confirm').style.display   = 'none';
      document.getElementById('t-alertResolve').textContent    = t('alertResolve');
      document.getElementById('t-alertTitle').textContent      = t('alertDupTitle');
      document.getElementById('t-alertHeadline').textContent   = t('alertDupHeadline');
      document.getElementById('t-alertExpectedLabel').textContent = t('alertDupRefLabel');
      document.getElementById('t-alertWrongLabel').textContent    = t('alertDupSerialLabel');
      Els.alertExpected.textContent = state.ref;
      Els.alertScanned.textContent  = serial;
      Els.alertView.classList.remove('hidden');
      Els.mainView.classList.add('hidden');
      stopAlertSound();
      playAlertSound();
      alertSoundInterval = setInterval(playAlertSound, 2000);
    }

    function stopAlertSound() {
      if (alertSoundInterval) {
        clearInterval(alertSoundInterval);
        alertSoundInterval = null;
      }
    }

    el('btn-resolve').onclick = () => {
      stopAlertSound();
      state.pendingSwitch = null;
      Els.alertView.classList.add('hidden');
      Els.mainView.classList.remove('hidden');
      Els.input.focus();
    };

    el('btn-switch-confirm').onclick = () => {
      stopAlertSound();
      Els.alertView.classList.add('hidden');
      Els.mainView.classList.remove('hidden');
      if (state.pendingSwitch) {
        const { product, kind, kindLabel, qty } = state.pendingSwitch;
        state.pendingSwitch = null;
        startNewBatch(product, kind, kindLabel, qty, 'batch');
      }
      Els.input.focus();
    };

    // ── 重置 ──────────────────────────────────────────────
    async function doReset() {
      if (state.scanLogs.length > 0) {
        const { error } = await _sb.from('kanban_scans').insert(state.scanLogs);
        if (error) {
          alert(`⚠️ 資料上傳失敗：${error.message}\n請截圖此訊息回報。`);
          return; // 上傳失敗時不重置，避免資料遺失
        }
        console.log(`已上傳 ${state.scanLogs.length} 筆，Session: ${SESSION_ID}`);
      }

      state.ref = null; state.total = 0;
      state.countInternal = 0; state.countCustomer = 0;
      state.expectedQty = null; state.pendingSwitch = null;
      state.scannedSerials = new Set();
      state.scanLogs = [];
      Els.scanCount.textContent       = '0';
      Els.countInternal.textContent   = '0';
      Els.countCustomer.textContent   = '0';
      Els.ghostInternal.textContent   = '0';
      Els.ghostCustomer.textContent   = '0';
      Els.refDisplay.innerHTML        = t('refEmpty');
      Els.refDisplay.className        = 'empty';
      Els.dotText.textContent         = t('sysReady');
      Els.historyBody.innerHTML       = `<tr><td colspan="4" style="padding:24px;text-align:center;color:var(--muted);font-style:italic">${t('historyEmpty')}</td></tr>`;
      Els.lastRaw.textContent         = '---';
      setCard('idle', t('statusIdle'), t('statusIdleSub'), 'STANDBY');
      if (!isMobile) Els.input.focus();
    }
    el('btn-reset').onclick = doReset;

    // ── 歷史 ──────────────────────────────────────────────
    function addHistory(product, kindLabel, kind, result, raw) {
      const now   = new Date().toLocaleTimeString('zh-TW', { hour12: false });
      state.scanLogs.push({ scanned_at: now, scan_type: kind, sku: product || '', raw_qr: raw || '', session_id: SESSION_ID });
      const badge = kind === 'internal'
        ? `<span class="badge badge-i">${t('badgeInternal')}</span>`
        : `<span class="badge badge-c">${t('badgeCustomer')}</span>`;
      const res   = result === 'ok'  ? `<span class="td-result res-ok">${t('resOk')}</span>`
                  : result === 'set' ? `<span class="td-result res-set">${t('resSet')}</span>`
                  : `<span class="td-result res-error">${t('resError')}</span>`;

      if (Els.historyBody.querySelector('[colspan]'))
        Els.historyBody.innerHTML = '';

      const row = document.createElement('tr');
      row.innerHTML =
        `<td class="td-time">${now}</td>` +
        `<td>${badge}</td>` +
        `<td class="td-product">${product || '?'}</td>` +
        `<td>${res}</td>`;
      Els.historyBody.insertBefore(row, Els.historyBody.firstChild);
      while (Els.historyBody.children.length > 10)
        Els.historyBody.removeChild(Els.historyBody.lastChild);
    }

    // ── 閃爍 ──────────────────────────────────────────────
    function flash(color) {
      Els.flashOverlay.style.background = color;
      Els.flashOverlay.style.opacity = '1';
      setTimeout(() => { Els.flashOverlay.style.opacity = '0'; }, 80);
    }

    // ── 音效 ──────────────────────────────────────────────
    function beep(type) {
      try {
        const ctx  = new (window.AudioContext || window.webkitAudioContext)();
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = type === 'ok' ? 880 : 300;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.2, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
        osc.start(); osc.stop(ctx.currentTime + 0.3);
      } catch (e) {}
    }

    function beepBatchComplete() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        // 工廠環境：高頻方波三音上升，音量大，穿透噪音
        // 低→中→高，間隔短促，尾音拉長
        const notes = [
          { freq: 900,  dur: 0.12, at: 0.00 },
          { freq: 1150, dur: 0.12, at: 0.16 },
          { freq: 1400, dur: 0.30, at: 0.32 },
        ];
        notes.forEach(n => {
          const osc  = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.frequency.value = n.freq;
          osc.type = 'square';
          const t = ctx.currentTime + n.at;
          gain.gain.setValueAtTime(0.55, t);
          gain.gain.exponentialRampToValueAtTime(0.001, t + n.dur);
          osc.start(t); osc.stop(t + n.dur + 0.01);
        });
      } catch (e) {}
    }

    function playAlertSound() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        for (let i = 0; i < 4; i++) {
          const osc  = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.frequency.value = i % 2 === 0 ? 880 : 1200;
          osc.type = 'square';
          const t = ctx.currentTime + i * 0.35;
          gain.gain.setValueAtTime(0.4, t);
          gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
          osc.start(t); osc.stop(t + 0.3);
        }
      } catch (e) {}
    }

    // ── 語言 dropdown ─────────────────────────────────────
    function toggleLangMenu() {
      document.getElementById('lang-dropdown').classList.toggle('open');
    }
    function selectLang(code, label) {
      document.getElementById('lang-current-label').textContent = label;
      document.getElementById('lang-dropdown').classList.remove('open');
      ['zh','vi','id'].forEach(c => {
        document.getElementById('lang-opt-' + c).classList.toggle('active', c === code);
      });
      applyLang(code);
    }
    document.addEventListener('click', e => {
      if (!e.target.closest('#lang-dropdown')) {
        document.getElementById('lang-dropdown').classList.remove('open');
      }
    });

    // ── 輸入 ──────────────────────────────────────────────
    const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);

    if (isMobile) {
      // 手機：用 document keydown 接收藍牙 / USB OTG 掃描槍，不 focus input 避免彈鍵盤
      let mobileBuffer = '';
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') { e.preventDefault(); doReset(); return; }
        if (e.key === 'Enter' || e.key === 'Tab') {
          e.preventDefault();
          const v = mobileBuffer.trim();
          mobileBuffer = '';
          if (v) handleScan(v);
        } else if (e.key.length === 1) {
          mobileBuffer += e.key;
        }
      });
    } else {
      // 桌機：沿用 hidden input 方式
      Els.input.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === 'Tab') {
          const v = Els.input.value.trim();
          Els.input.value = '';
          e.preventDefault();
          if (v) handleScan(v);
        }
      });
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') { e.preventDefault(); doReset(); }
        if (e.metaKey || e.ctrlKey) return;
        if (Els.alertView.classList.contains('hidden')) Els.input.focus();
      });
      document.addEventListener('click', e => {
        if (e.target.tagName === 'BUTTON' || e.target.closest('button')) return;
        if (Els.alertView.classList.contains('hidden')) Els.input.focus();
      });
      Els.input.focus();
    }
    applyLang(currentLang);
  </script>
</body>
