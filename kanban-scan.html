<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>зңӢжқҝжҜ”е°Қзі»зөұ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@400;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #060c18;
      --surface: #0d1421;
      --card:    #131f33;
      --border:  rgba(255,255,255,0.07);
      --text:    #e8edf5;
      --muted:   #4a6080;
      --cyan:    #00c8ff;
      --green:   #00e676;
      --red:     #ff1744;
      --orange:  #ff6d00;
      --amber:   #ffab00;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { height: 100%; height: 100dvh; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      height: 100%;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      /* Dot grid background */
      background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 28px 28px;
    }
    #main-view {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .hidden { display: none !important; }

    /* в”Җв”Җ Scanner input в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
    #barcode-input {
      position: fixed; top: -9999px; left: -9999px;
      opacity: 0; width: 1px; height: 1px;
    }

    /* в”Җв”Җ Flash overlay в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
    #flash-overlay {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 200;
      opacity: 0; transition: opacity 0.15s;
    }

    /* в”Җв”Җ Company bar в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
    .company-bar {
      display: flex; align-items: baseline; gap: 10px;
      padding: 6px 20px;
      background: var(--cyan);
      flex-shrink: 0;
    }
    .company-name {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.95rem; font-weight: 700;
      color: #fff; letter-spacing: 3px;
    }
    .company-sub {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.7rem; font-weight: 600;
      color: rgba(255,255,255,0.7); letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
       HEADER
    в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: rgba(13,20,33,0.95);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    @media (max-width: 640px) {
      .company-bar    { padding: 4px 12px; }
      .company-name   { font-size: 0.8rem; letter-spacing: 2px; }
      .company-sub    { font-size: 0.6rem; }
      header          { gap: 0; padding: 0; }
      main            { padding: 6px 8px; gap: 5px; }

      /* в”Җв”Җ Section 3: Counters в”Җв”Җ */
      .counters         { gap: 5px; flex-shrink: 0; }
      .counter-panel    { padding: 5px 10px; }
      .counter-label    { margin-bottom: 0; font-size: 0.55rem; letter-spacing: 0.5px; line-height: 1.2; white-space: normal; }
      .counter-num      { font-size: 4rem; line-height: 1; }
      .counter-ghost    { display: none; }

      #btn-reset      { padding: 7px 12px; font-size: 0.8rem; }
      footer          { padding: 3px 12px; font-size: 0.6rem; }
      #ref-badge      { padding: 5px 12px; }
      #ref-badge-val  { font-size: 0.85rem; }
    }

    .logo {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700; font-size: 1.15rem;
      color: var(--text);
      letter-spacing: 1px;
      text-transform: uppercase;
      white-space: nowrap;
      text-decoration: none;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: var(--cyan);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-icon svg { display: block; }
    .logo-text { display: flex; flex-direction: column; line-height: 1.1; }
    .logo-text-main { font-size: 1rem; font-weight: 700; color: var(--text); letter-spacing: 2px; }
    .logo-text-sub  { font-size: 0.6rem; font-weight: 600; color: var(--muted); letter-spacing: 3px; }

    .divider { width: 1px; height: 32px; background: var(--border); flex-shrink: 0; }

    /* Reference number pill */
    .ref-pill {
      flex: 1;
      display: flex; align-items: center; gap: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 18px;
      min-width: 0;
    }
    .ref-pill-label {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.7rem; font-weight: 600;
      color: var(--muted); text-transform: uppercase; letter-spacing: 2px;
      white-space: nowrap;
    }
    #ref-display {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700; font-size: 1.3rem;
      color: var(--cyan); letter-spacing: 3px;
      flex: 1; truncate: ellipsis; overflow: hidden;
      white-space: nowrap; text-overflow: ellipsis;
    }
    #ref-display.empty { color: var(--muted); font-size: 0.9rem; font-weight: 400; letter-spacing: 1px; font-family: 'DM Sans', sans-serif; }

    /* Scan counter */
    .scan-counter {
      display: flex; flex-direction: column; align-items: center;
      font-family: 'Rajdhani', sans-serif;
    }
    .scan-counter-val {
      font-size: 1.5rem; font-weight: 700; color: var(--text);
      line-height: 1;
    }
    .scan-counter-lbl {
      font-size: 0.6rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase;
    }

    /* Reset button */
    #btn-reset {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.8rem; font-weight: 600;
      letter-spacing: 1px; cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    @media (hover: hover) { #btn-reset:hover { border-color: var(--red); color: var(--red); } }
    #btn-reset:active { border-color: var(--red); color: var(--red); }

    /* Upload button */
    #btn-upload {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 12px;
      background: transparent;
      border: 1px solid rgba(0,200,255,0.4);
      border-radius: 6px;
      color: var(--cyan);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.8rem; font-weight: 600;
      letter-spacing: 1px; cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap; position: relative;
    }
    @media (hover: hover) { #btn-upload:hover { background: rgba(0,200,255,0.08); border-color: var(--cyan); } }
    #btn-upload:active { background: rgba(0,200,255,0.08); }
    .upload-badge {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 16px; height: 16px; padding: 0 4px;
      background: var(--cyan); color: #060c18;
      border-radius: 8px; font-size: 0.6rem; font-weight: 700;
      line-height: 1;
    }
    .upload-badge.hidden { display: none; }

    /* Lang dropdown */
    .lang-dropdown { position:relative; }
    .lang-trigger {
      display:flex; align-items:center; gap:5px;
      padding:7px 12px; border-radius:8px;
      border:1px solid var(--border); background:transparent;
      color:var(--text); font-family:'Rajdhani',sans-serif;
      font-size:0.8rem; font-weight:700; letter-spacing:1px;
      cursor:pointer; transition:all .2s; white-space:nowrap;
    }
    .lang-trigger:hover { border-color:var(--cyan); color:var(--cyan); }
    .lang-trigger svg { flex-shrink:0; transition: transform .2s; }
    .lang-dropdown.open .lang-trigger svg { transform: rotate(180deg); }
    .lang-menu {
      display:none; position:absolute; top:calc(100% + 6px); right:0;
      background:var(--card); border:1px solid var(--border);
      border-radius:10px; overflow:hidden; z-index:50;
      box-shadow:0 8px 24px rgba(0,0,0,0.12);
      min-width:120px;
    }
    .lang-dropdown.open .lang-menu { display:block; }
    .lang-option {
      display:flex; align-items:center; gap:8px;
      padding:10px 16px; cursor:pointer;
      font-family:'Rajdhani',sans-serif; font-size:0.85rem; font-weight:600;
      color:var(--text); letter-spacing:1px;
      transition:background .15s;
      border:none; background:none; width:100%; text-align:left;
    }
    .lang-option:hover { background:var(--surface); }
    .lang-option.active { color:var(--cyan); }
    .lang-option .lang-flag { font-size:1.1rem; }

    /* Mobile header */
    @media (max-width: 640px) {
      header          { gap:0; justify-content:space-between; }
      .ref-pill       { display:none; }
      .divider        { display:none; }
      #qr-link        { display:none; }
      .logo-text-sub  { display:none; }
      .lang-label-text { display:none; }

      /* еӣӣеҖӢе…ғзҙ зӯүеҜ¬ */
      .scan-counter, #btn-reset, #btn-upload, .lang-dropdown {
        flex: 1;
        display: flex !important;
        align-items: center;
        justify-content: center;
      }
      .scan-counter   { flex-direction:column; }
      #btn-reset      { padding:14px 0; min-height:44px; font-size:0.8rem; letter-spacing:0; width:100%; border-radius:0; border-left:1px solid var(--border); border-right:none; border-top:none; border-bottom:none; }
      #btn-upload     { padding:14px 0; min-height:44px; font-size:0.8rem; letter-spacing:0; width:100%; border-radius:0; border-left:1px solid rgba(0,200,255,0.3); border-right:1px solid var(--border); border-top:none; border-bottom:none; }
      .lang-trigger   { padding:14px 0; min-height:44px; font-size:1rem; width:100%; justify-content:center; border:none; border-radius:0; }
      .lang-dropdown  { border:none; }
      .lang-menu      { right:0; }
      /* жЎҢж©ҹйЎҜзӨәзҡ„ ref-pill еңЁжүӢж©ҹе®Ңе…ЁдёҚдҪ”з©әй–“ */
      .ref-pill       { display:none !important; }
      .company-bar    { padding: 3px 12px; }
      /* иЎЁж јйҡұи—ҸйЎһеҲҘж¬„ */
      .col-type       { display:none; }
    }

    /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
       MAIN
    в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px 28px;
      gap: 12px;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
      min-height: 0;
      overflow: hidden;
    }

    /* в”Җв”Җ Ref badge (mobile, below status card) в”Җв”Җ */
    #ref-badge {
      display: flex; align-items: center; gap: 8px;
      background: var(--card); border: 1px solid rgba(0,136,187,0.4);
      border-radius: 8px; padding: 8px 16px;
    }
    .ref-badge-label {
      font-family: 'Rajdhani', sans-serif; font-size: 0.7rem; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
      white-space: nowrap;
    }
    #ref-badge-val {
      font-family: 'JetBrains Mono', monospace; font-weight: 700;
      font-size: 1rem; color: var(--cyan); letter-spacing: 2px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    @media (min-width: 641px) { #ref-badge { display: none !important; } }

    /* в”Җв”Җ Counter panels в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
    .counters {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      flex-shrink: 0;
    }

    .counter-panel {
      border: 2px solid var(--border);
      border-radius: 12px;
      background: var(--card);
      padding: 28px 32px;
      position: relative;
      overflow: hidden;
    }
    .counter-panel.internal { border-color: rgba(0,200,255,0.35); }
    .counter-panel.customer { border-color: rgba(255,109,0,0.35); }
    .counter-panel.mismatch { border-color: var(--amber) !important; box-shadow: 0 0 16px rgba(255,171,0,0.2); }

    .counter-label {
      display: flex; align-items: center; gap: 8px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.8rem; font-weight: 600;
      letter-spacing: 3px; text-transform: uppercase;
      margin-bottom: 12px;
    }
    .counter-label.internal { color: var(--cyan); }
    .counter-label.customer { color: var(--orange); }

    .counter-dot {
      width: 6px; height: 6px; border-radius: 50%;
    }
    .internal .counter-dot { background: var(--cyan); box-shadow: 0 0 8px var(--cyan); }
    .customer .counter-dot { background: var(--orange); box-shadow: 0 0 8px var(--orange); }

    .counter-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 8rem; font-weight: 800;
      line-height: 1;
      transition: transform 0.1s;
    }
    .internal .counter-num { color: var(--cyan); }
    .customer .counter-num { color: var(--orange); }

    .counter-ghost {
      position: absolute;
      right: -10px; bottom: -20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10rem; font-weight: 800;
      opacity: 0.04; line-height: 1;
      pointer-events: none; user-select: none;
    }
    .internal .counter-ghost { color: var(--cyan); }
    .customer .counter-ghost { color: var(--orange); }

    /* в”Җв”Җ History в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
    .history-panel {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--card);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }
    .table-scroll {
      overflow-y: auto;
      flex: 1;
      min-height: 0;
    }
    @media (max-width: 640px) {
      .history-panel  { flex: 1 1 0; min-height: 100px; }
      .table-scroll   { overflow-y: auto; flex: 1; min-height: 0; }
    }
    .history-head {
      padding: 12px 20px;
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .history-head-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.75rem; font-weight: 600;
      letter-spacing: 3px; text-transform: uppercase;
      color: var(--muted);
    }
    table {
      width: 100%; border-collapse: collapse;
    }
    thead th {
      padding: 8px 20px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.65rem; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted);
      text-align: left;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0;
      background: var(--card);
      z-index: 1;
    }
    tbody tr {
      border-bottom: 1px solid rgba(255,255,255,0.07);
      transition: background 0.15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.04); }
    td {
      padding: 8px 20px;
      font-size: 0.85rem;
    }
    .td-time { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--muted); }
    .td-product { font-family: 'JetBrains Mono', monospace; font-weight: 700; letter-spacing: 1px; }
    .td-result { text-align: right; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 0.9rem; letter-spacing: 1px; }

    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.65rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    }
    .badge-i { background: rgba(0,200,255,0.1); color: var(--cyan); border: 1px solid rgba(0,200,255,0.3); }
    .badge-c { background: rgba(255,109,0,0.1); color: var(--orange); border: 1px solid rgba(255,109,0,0.3); }

    .res-ok    { color: var(--green); }
    .res-set   { color: var(--cyan); }
    .res-error { color: var(--red); }

    /* в”Җв”Җ Status bar в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
    footer {
      background: rgba(13,20,33,0.95);
      border-top: 1px solid var(--border);
      padding: 6px 20px;
      flex-shrink: 0;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.65rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
      gap: 12px;
    }
    .footer-left { display: flex; align-items: center; gap: 8px; overflow: hidden; }
    #last-raw { color: var(--cyan); max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .footer-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    #btn-upload {
      padding: 3px 10px;
      font-size: 0.65rem;
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: 0.5px;
      background: transparent;
      border: 1px solid rgba(0,200,255,0.35);
      border-radius: 6px;
      color: var(--cyan);
      cursor: pointer;
      transition: all 0.15s;
    }
    @media (hover: hover) { #btn-upload:hover { border-color: var(--cyan); background: rgba(0,200,255,0.08); } }
    #status-dot-text::before {
      content: 'в—Ҹ';
      color: var(--green);
      margin-right: 5px;
      animation: blink 2s infinite;
    }
    @keyframes blink { 50% { opacity: 0.3; } }

    /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
       ALERT VIEW

    };

    let currentLang = localStorage.getItem('ray-lang') || 'zh';
    const t = k => (LANGS[currentLang] || LANGS.zh)[k] || k;

    const langFlags = { zh:'рҹҮ№рҹҮј', vi:'рҹҮ»рҹҮі', id:'рҹҮ®рҹҮ©' };
    const langLabels = { zh:'дёӯж–Ү', vi:'Tiбәҝng Viб»Үt', id:'Indonesia' };

    function applyLang(lang) {
      currentLang = lang;
      try { localStorage.setItem('ray-lang', lang); } catch(e) {}
      const L = LANGS[lang];
      // Update dropdown trigger flag + label
      document.getElementById('lang-current-flag').textContent = langFlags[lang] || 'рҹҮ№рҹҮј';
      document.getElementById('lang-current-label').textContent = langLabels[lang] || lang;
      // Update dropdown active state
      ['zh','vi','id'].forEach(c => {
        const o = document.getElementById('lang-opt-' + c);
        if (o) o.classList.toggle('active', c === lang);
      });
      // Update static elements
      const ids = ['logo','refLabel','scanLbl','internalLabel','customerLabel',
                   'historyTitle','historyRecent','thTime','thType','thCode','thResult',
                   'scannerLocked','alertTitle','alertHeadline','alertExpectedLabel',
                   'alertWrongLabel','alertResolve','alertActualLabel','alertExpectedQtyLabel',
                   'alertNewProductLabel','btnSwitchConfirm'];
      ids.forEach(k => { const el = document.getElementById('t-'+k); if(el) el.textContent = L[k]; });
      document.getElementById('btn-reset').innerHTML =
        `${L.resetBtn} <span style="opacity:.5;font-size:.8em">ESC</span>`;
      const uploadBadgeEl = document.getElementById('upload-badge');
      document.getElementById('btn-upload').innerHTML =
        `${L.uploadBtn}`;
      document.getElementById('btn-upload').appendChild(uploadBadgeEl);
      document.getElementById('qr-link').textContent = L.qrLink;
      // Update current state text
      if (!state.ref) {
        Els.refDisplay.textContent = L.refEmpty;
        Els.dotText.textContent    = L.sysReady;
        setCard('idle', L.statusIdle, L.statusIdleSub, 'STANDBY');
        if (Els.historyBody.querySelector('[colspan]'))
          Els.historyBody.innerHTML = `<tr><td colspan="2" style="padding:24px;text-align:center;color:var(--muted);font-style:italic">${L.historyEmpty}</td></tr>`;
      }
    }
    // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

    const _savedLogs = JSON.parse(localStorage.getItem('kanban_scanLogs') || '[]');
    const state = { ref: null, total: 0, countInternal: 0, countCustomer: 0,
                    expectedQty: null, pendingSwitch: null, scannedSerials: new Set(),
                    scanLogs: _savedLogs, uploadedCount: 0 };
    // й Ғйқўијүе…ҘеҫҢйЎҜзӨә badgeпјҲйңҖзӯү DOM readyпјҢж•…з”Ё setTimeoutпјү
    setTimeout(() => updateUploadBadge && updateUploadBadge(), 0);

    const el  = id => document.getElementById(id);
    const Els = {
      input:         el('barcode-input'),
      mainView:      el('main-view'),
      alertView:     el('alert-view'),
      refDisplay:    el('ref-display'),
      scanCount:     el('scan-count'),
      countInternal: el('count-internal'),
      countCustomer: el('count-customer'),
      ghostInternal: el('ghost-internal'),
      ghostCustomer: el('ghost-customer'),
      historyBody:   el('scan-history'),
      alertExpected: el('alert-expected'),
      alertScanned:  el('alert-scanned'),
      flashOverlay:  el('flash-overlay'),
    };

    // в”Җв”Җ IME иҪүжҸӣ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    function toHalf(str) {
      return str.replace(/[\uff01-\uff5e]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xfee0))
                .replace(/\u3000/g, ' ');
    }

    // в”Җв”Җ ж–ҷиҷҹж“·еҸ– в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    function extractProduct(raw) {
      const s = toHalf(raw).trim();
      if (s.includes('J004') || s.startsWith('1AC')) {
        const m = s.match(/\sE(.{15})(.{12})/);
        const qm = s.match(/\s(\d+)\w?\s*$/);
        const qty = qm ? parseInt(qm[1], 10) : null;
        if (m) return { kind: 'customer', product: m[2], qty };
        return { kind: 'customer', product: null, qty: null };
      }
      if (INTERNAL_PREFIX && s.startsWith(INTERNAL_PREFIX)) {
        const body = s.slice(INTERNAL_PREFIX.length).trim();
        const dashIdx = body.lastIndexOf('-');
        if (dashIdx > 0)
          return { kind: 'internal', product: body.slice(0, dashIdx), qty: null, serial: body.slice(dashIdx + 1) };
        return { kind: 'internal', product: body, qty: null, serial: null };
      }
      return { kind: 'internal', product: s, qty: null, serial: null };
    }

    // в”Җв”Җ DEBUG в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    let debugLines = [];
    function dbg(msg) {
      debugLines.unshift(msg);
      if (debugLines.length > 20) debugLines.pop();
      document.getElementById('debug-panel').textContent = debugLines.join('\n');
    }

    // в”Җв”Җ дё»иҷ•зҗҶ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    function handleScan(raw) {
      if (/[\u4E00-\u9FFF\u3100-\u312F]/.test(raw)) {
        flash('rgba(255,171,0,0.25)');
        return;
      }

      const { kind, product, qty, serial } = extractProduct(raw);
      const kindLabel = kind === 'customer' ? t('kindCustomer') : t('kindInternal');

      if (!product) {
        dbg(`вқҢ и§ЈжһҗеӨұж•— raw="${raw.slice(0,20)}"`);
        setCard('idle', t('noExtract'), `${raw.slice(0, 30)}`, 'ERROR');
        beep('error'); return;
      }

      if (state.ref === null) {
        dbg(`рҹҶ• ж–°жү№ж¬Ў kind=${kind} product=${product}`);
        startNewBatch(product, kind, kindLabel, qty, 'ok', raw);
      } else if (product === state.ref) {
        dbg(`вң… еҗҢз•Әиҷҹ kind=${kind} cI=${state.countInternal} cC=${state.countCustomer}вҶ’+1`);
        // еҸӘжңүжӯЈзўәжүҚиЁҲж•ё
        state.total++;
        if (serial) state.scannedSerials.add(serial);
        updateCountDisplay(kind);
        const suffix = t('kindSuffix') ? `${kindLabel}${t('kindSuffix')}` : kindLabel;
        const progress = state.expectedQty ? ` (${state.total}/${state.expectedQty})` : '';
        setCard('ok', t('matchOk'), `${suffix} В· ${product}${progress}`, 'MATCH OK');
        Els.scanCount.textContent = state.expectedQty
          ? `${state.total}/${state.expectedQty}` : state.total;
        addHistory(product, kindLabel, kind, 'ok', raw);
        // е ҙе…§пјқе®ўжҲ¶ вҶ’ йҖҷе°Қеүӣй…Қе°ҚжҲҗеҠҹпјҢз«ӢеҚізөҰе®ҢжҲҗйҹіпјӢз¶ иүІй–ғзҲҚ
        if (state.countInternal === state.countCustomer) {
          beepBatchComplete();
          flash('rgba(0, 230, 118, 0.45)');
        } else {
          beep('ok');
          flash('rgba(0, 200, 255, 0.2)');
        }
      } else {
        // дёҚеҗҢз•ӘиҷҹеҮәзҸҫ вҖ” е ҙе…§ејөж•ёеҝ…й Ҳзӯүж–је®ўжҲ¶ејөж•ёжүҚиғҪжҸӣжү№
        if (state.countInternal !== state.countCustomer) {
          dbg(`вҡ пёҸ дёҚеҗҢз•Әиҷҹ+дёҚе№іиЎЎ ref=${state.ref} new=${product} cI=${state.countInternal} cC=${state.countCustomer}`);
          // е…©йӮҠдёҚдёҖиҮҙпјҢи·іиӯҰе‘Ҡ
          addHistory(product, kindLabel, kind, 'error', raw);
          beep('error');
          state.pendingSwitch = { product, kind, kindLabel, qty };
          triggerSwitchAlert(state.countInternal, state.countCustomer, product);
        } else {
          dbg(`рҹ”„ жҸӣжү№ж¬Ў new=${product}`);
          // е…©йӮҠдёҖиҮҙпјҢиҮӘеӢ•жҸӣжү№ж¬ЎпјҲе®ҢжҲҗйҹіе·ІеңЁй…Қе°Қз•¶дёӢж’ӯйҒҺпјҢж”№з”Ёжҷ®йҖҡйҹіпјү
          startNewBatch(product, kind, kindLabel, qty, 'ok', raw);
        }
      }
    }

    // в”Җв”Җ зӢҖж…ӢеҚЎ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    function setCard() {}

    function bumpCounter(el) {
      el.style.transform = 'scale(1.15)';
      setTimeout(() => { el.style.transform = ''; }, 120);
    }

    function updateCountDisplay(kind) {
      if (kind === 'internal') {
        state.countInternal++;
        Els.countInternal.textContent = state.countInternal;
        Els.ghostInternal.textContent = state.countInternal;
        bumpCounter(Els.countInternal);
      } else {
        state.countCustomer++;
        Els.countCustomer.textContent = state.countCustomer;
        Els.ghostCustomer.textContent = state.countCustomer;
        bumpCounter(Els.countCustomer);
      }
      // е…©йӮҠдёҚдёҖиҮҙжҷӮеҠ иӯҰзӨәйӮҠжЎҶ
      const mismatch = state.countInternal > 0 && state.countCustomer > 0
                    && state.countInternal !== state.countCustomer;
      document.querySelector('.counter-panel.internal').classList.toggle('mismatch', mismatch);
      document.querySelector('.counter-panel.customer').classList.toggle('mismatch', mismatch);
    }

    function startNewBatch(product, kind, kindLabel, qty, sound = 'ok', raw = '') {
      state.ref = product;
      state.expectedQty = qty;
      state.scannedSerials = new Set();
      // е…©йӮҠжӯёйӣ¶
      state.total = 0; state.countInternal = 0; state.countCustomer = 0;
      Els.countInternal.textContent = '0'; Els.ghostInternal.textContent = '0';
      Els.countCustomer.textContent = '0'; Els.ghostCustomer.textContent = '0';
      Els.refDisplay.textContent = product;
      Els.refDisplay.classList.remove('empty');
      document.getElementById('ref-badge-val').textContent = product;
      document.getElementById('ref-badge').classList.remove('hidden');
      // з¬¬дёҖејөиЁҲе…Ҙ 1
      state.total = 1;
      updateCountDisplay(kind);
      Els.scanCount.textContent = qty ? `1/${qty}` : '1';
      Els.dotText.textContent = t('comparing');
      const suffix = t('kindSuffix') ? `${kindLabel}${t('kindSuffix')}` : kindLabel;
      setCard('set', t('refSet'), `${suffix} В· ${product}`, 'LOCKED');
      addHistory(product, kindLabel, kind, 'set', raw);
      if (sound === 'batch') beepBatchComplete(); else beep('ok');
    }

    // в”Җв”Җ иӯҰе ұ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    let alertSoundInterval = null;

    function triggerAlert(wrongProduct) {
      document.getElementById('alert-codes-mismatch').style.display = '';
      document.getElementById('alert-codes-switch').style.display   = 'none';
      document.getElementById('alert-new-product-row').style.display = 'none';
      document.getElementById('btn-switch-confirm').style.display   = 'none';
      document.getElementById('t-alertResolve').textContent = t('alertResolve');
      document.getElementById('t-alertTitle').textContent   = t('alertTitle');
      Els.alertExpected.textContent = state.ref;
      Els.alertScanned.textContent  = wrongProduct;
      Els.alertView.classList.remove('hidden');
      stopAlertSound();
      playAlertSound();
      alertSoundInterval = setInterval(playAlertSound, 2000);
    }

    function triggerSwitchAlert(actual, expected, newProduct) {
      document.getElementById('alert-codes-mismatch').style.display  = 'none';
      document.getElementById('alert-codes-switch').style.display    = '';
      document.getElementById('alert-new-product-row').style.display = '';
      document.getElementById('btn-switch-confirm').style.display    = '';
      document.getElementById('t-alertResolve').textContent    = t('alertResolveSwitch');
      document.getElementById('t-alertTitle').textContent      = t('alertSwitchTitle');
      document.getElementById('alert-actual-count').textContent   = actual;
      document.getElementById('alert-expected-count').textContent = expected;
      document.getElementById('alert-new-product-val').textContent = newProduct;
      Els.alertView.classList.remove('hidden');
      stopAlertSound();
      playAlertSound();
      alertSoundInterval = setInterval(playAlertSound, 2000);
    }

    function triggerDuplicateAlert(serial) {
      document.getElementById('alert-codes-mismatch').style.display = '';
      document.getElementById('alert-codes-switch').style.display   = 'none';
      document.getElementById('alert-new-product-row').style.display = 'none';
      document.getElementById('btn-switch-confirm').style.display   = 'none';
      document.getElementById('t-alertResolve').textContent    = t('alertResolve');
      document.getElementById('t-alertTitle').textContent      = t('alertDupTitle');
      document.getElementById('t-alertExpectedLabel').textContent = t('alertDupRefLabel');
      document.getElementById('t-alertWrongLabel').textContent    = t('alertDupSerialLabel');
      Els.alertExpected.textContent = state.ref;
      Els.alertScanned.textContent  = serial;
      Els.alertView.classList.remove('hidden');
      stopAlertSound();
      playAlertSound();
      alertSoundInterval = setInterval(playAlertSound, 2000);
    }

    function stopAlertSound() {
      if (alertSoundInterval) {
        clearInterval(alertSoundInterval);
        alertSoundInterval = null;
      }
    }

    el('btn-resolve').onclick = () => {
      stopAlertSound();
      state.pendingSwitch = null;
      Els.alertView.classList.add('hidden');
      Els.input.focus();
    };

    el('btn-switch-confirm').onclick = () => {
      stopAlertSound();
      Els.alertView.classList.add('hidden');
      if (state.pendingSwitch) {
        const { product, kind, kindLabel, qty } = state.pendingSwitch;
        state.pendingSwitch = null;
        startNewBatch(product, kind, kindLabel, qty, 'batch');
      }
      Els.input.focus();
    };

    // в”Җв”Җ йҮҚзҪ® в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    async function doReset() {
      const resetBtn = el('btn-reset');
      resetBtn.blur();

      state.ref = null; state.total = 0;
      state.countInternal = 0; state.countCustomer = 0;
      state.expectedQty = null; state.pendingSwitch = null;
      state.scannedSerials = new Set();
      Els.scanCount.textContent       = '0';
      Els.countInternal.textContent   = '0';
      Els.countCustomer.textContent   = '0';
      Els.ghostInternal.textContent   = '0';
      Els.ghostCustomer.textContent   = '0';
      Els.refDisplay.innerHTML        = t('refEmpty');
      Els.refDisplay.className        = 'empty';
      document.getElementById('ref-badge').classList.add('hidden');
      document.querySelector('.counter-panel.internal').classList.remove('mismatch');
      document.querySelector('.counter-panel.customer').classList.remove('mismatch');
      Els.dotText.textContent         = t('sysReady');
      setCard('idle', t('statusIdle'), t('statusIdleSub'), 'STANDBY');
      if (!isMobile) Els.input.focus();
    }
    el('btn-reset').onclick = doReset;

    // в”Җв”Җ дёҠеӮі badge в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    function updateUploadBadge() {
      const pending = state.scanLogs.length - state.uploadedCount;
      const badge = el('upload-badge');
      if (badge) {
        if (pending > 0) {
          badge.textContent = pending;
          badge.classList.remove('hidden');
        } else {
          badge.classList.add('hidden');
        }
      }
    }

    // в”Җв”Җ дёҠеӮіпјҲдёҚйҮҚзҪ®пјүв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    async function doUpload() {
      const btn = el('btn-upload');
      const newLogs = state.scanLogs.slice(state.uploadedCount);
      
      const setBtnHtml = (text) => {
        btn.innerHTML = `${text}<span id="upload-badge" class="upload-badge hidden"></span>`;
        updateUploadBadge();
      };

      if (!newLogs.length) { 
        setBtnHtml(t('uploadNoData')); 
        setTimeout(() => setBtnHtml(t('uploadBtn')), 1500); 
        return; 
      }
      
      btn.disabled = true; 
      setBtnHtml(t('uploading'));
      
      try {
        const { error } = await _sb.from('kanban_scans').insert(newLogs);
        if (error) throw error;
        
        state.scanLogs.splice(0, state.uploadedCount + newLogs.length);
        state.uploadedCount = 0;
        localStorage.removeItem('kanban_scanLogs');
        
        setBtnHtml(t('uploadOk')); 
        btn.style.borderColor = 'var(--green)'; 
        btn.style.color = 'var(--green)';
        Els.historyBody.innerHTML = `<tr><td colspan="2" style="padding:24px;text-align:center;color:var(--muted);font-style:italic">${t('historyEmpty')}</td></tr>`;
      } catch (err) {
        console.error('Upload error:', err);
        setBtnHtml(t('uploadFail')); 
        btn.style.borderColor = 'var(--red)'; 
        btn.style.color = 'var(--red)';
      } finally {
        setTimeout(() => { 
          btn.disabled = false; 
          setBtnHtml(t('uploadBtn')); 
          btn.style.borderColor = ''; 
          btn.style.color = ''; 
        }, 2000);
      }
    }
    window.doUpload = doUpload;

    // в”Җв”Җ жӯ·еҸІ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    function addHistory(product, kindLabel, kind, result, raw) {
      const now   = new Date();
      const scanned_at = now.getFullYear() + '-' +
        String(now.getMonth()+1).padStart(2,'0') + '-' +
        String(now.getDate()).padStart(2,'0') + ' ' +
        now.toLocaleTimeString('zh-TW', { hour12: false });
      state.scanLogs.push({ scanned_at, scan_type: kind, sku: product || '', raw_qr: raw || '', result: result || '', session_id: SESSION_ID });
      localStorage.setItem('kanban_scanLogs', JSON.stringify(state.scanLogs));
      updateUploadBadge();
      const badge = kind === 'internal'
        ? `<span class="badge badge-i">${t('badgeInternal')}</span>`
        : `<span class="badge badge-c">${t('badgeCustomer')}</span>`;
      const res   = result === 'ok'  ? `<span class="td-result res-ok">${t('resOk')}</span>`
                  : result === 'set' ? `<span class="td-result res-set">${t('resSet')}</span>`
                  : `<span class="td-result res-error">${t('resError')}</span>`;

      if (Els.historyBody.querySelector('[colspan]'))
        Els.historyBody.innerHTML = '';

      const row = document.createElement('tr');
      row.innerHTML =
        `<td class="td-time">${now.toLocaleTimeString('zh-TW', { hour12: false })}</td>` +
        `<td class="td-product">${raw || '?'}</td>`;
      Els.historyBody.insertBefore(row, Els.historyBody.firstChild);
      while (Els.historyBody.children.length > 10)
        Els.historyBody.removeChild(Els.historyBody.lastChild);
    }

    // в”Җв”Җ й–ғзҲҚ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    function flash(color) {
      Els.flashOverlay.style.background = color;
      Els.flashOverlay.style.opacity = '1';
      setTimeout(() => { Els.flashOverlay.style.opacity = '0'; }, 80);
    }

    // в”Җв”Җ йҹіж•Ҳ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    // е»әз«Ӣе…Ёеҹҹзҡ„ AudioContext йҒҝе…ҚйҖЈзәҢжҺғжҸҸжҷӮи¶…еҮәзҖҸиҰҪеҷЁеҜҰдҫӢдёҠйҷҗ (йҖҡеёёжңҖеӨҡ 6 еҖӢ)
    const sharedAudioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function beep(type) {
      try {
        if (sharedAudioCtx.state === 'suspended') sharedAudioCtx.resume();
        const ctx  = sharedAudioCtx;
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = type === 'ok' ? 880 : 300;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.2, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
        osc.start(); osc.stop(ctx.currentTime + 0.3);
      } catch (e) {}
    }

    function beepBatchComplete() {
      try {
        if (sharedAudioCtx.state === 'suspended') sharedAudioCtx.resume();
        const ctx = sharedAudioCtx;
        // е·Ҙе» з’°еўғпјҡй«ҳй »ж–№жіўдёүйҹідёҠеҚҮпјҢйҹійҮҸеӨ§пјҢз©ҝйҖҸеҷӘйҹі
        // дҪҺвҶ’дёӯвҶ’й«ҳпјҢй–“йҡ”зҹӯдҝғпјҢе°ҫйҹіжӢүй•·
        const notes = [
          { freq: 900,  dur: 0.12, at: 0.00 },
          { freq: 1150, dur: 0.12, at: 0.16 },
          { freq: 1400, dur: 0.30, at: 0.32 },
        ];
        notes.forEach(n => {
          const osc  = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.frequency.value = n.freq;
          osc.type = 'square';
          const t = ctx.currentTime + n.at;
          gain.gain.setValueAtTime(0.55, t);
          gain.gain.exponentialRampToValueAtTime(0.001, t + n.dur);
          osc.start(t); osc.stop(t + n.dur + 0.01);
        });
      } catch (e) {}
    }

    function playAlertSound() {
      try {
        if (sharedAudioCtx.state === 'suspended') sharedAudioCtx.resume();
        const ctx = sharedAudioCtx;
        for (let i = 0; i < 4; i++) {
          const osc  = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.frequency.value = i % 2 === 0 ? 880 : 1200;
          osc.type = 'square';
          const t = ctx.currentTime + i * 0.35;
          gain.gain.setValueAtTime(0.4, t);
          gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
          osc.start(t); osc.stop(t + 0.3);
        }
      } catch (e) {}
    }

    // в”Җв”Җ иӘһиЁҖ dropdown в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    function toggleLangMenu() {
      document.getElementById('lang-dropdown').classList.toggle('open');
    }
    function selectLang(code) {
      document.getElementById('lang-dropdown').classList.remove('open');
      applyLang(code);
    }
    document.addEventListener('click', e => {
      if (!e.target.closest('#lang-dropdown')) {
        document.getElementById('lang-dropdown').classList.remove('open');
      }
    });

    // в”Җв”Җ ијёе…Ҙ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
    
    let submitTimer = null;
    let fallbackBuffer = '';

    const processScan = () => {
      let raw = isMobile ? fallbackBuffer : Els.input.value;
      if (!isMobile) Els.input.value = '';
      fallbackBuffer = '';
      
      // е°Үеӯ—дёІдҫқжҸӣиЎҢз¬ҰиҷҹпјҲEnterпјүеҲҮй–ӢпјҢзўәдҝқйҖЈзәҢеҲ·зўјпјҲзһ¬й–“йҖҒе…ҘеӨҡејөпјүжҷӮиғҪеҗ„иҮӘзҚЁз«Ӣиҷ•зҗҶ
      const parts = raw.split('\n').map(v => v.trim()).filter(Boolean);
      
      for (let p of parts) {
         // е°Үе…§еөҢзҡ„ Tab иҪүдҪңз©әзҷҪпјҢдҝқз•ҷе–®дёҖжўқзўјзҡ„е®Ңж•ҙжҖ§
         p = p.replace(/[\t]/g, ' ').replace(/\s+/g, ' ').trim();
         if (p) handleScan(p);
      }
    };

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { e.preventDefault(); doReset(); return; }
      if (e.metaKey || e.ctrlKey || e.altKey) return;
      if (!Els.alertView.classList.contains('hidden')) { dbg(`рҹҡ« alertView ж“ӢдҪҸ key=${e.key}`); return; }
      if (e.key === 'Enter') dbg(`вҢЁпёҸ Enter isMobile=${isMobile} buf="${fallbackBuffer.slice(0,15)}" inp="${Els.input.value.slice(0,15)}"}`);

      if (!isMobile && document.activeElement !== Els.input) {
        Els.input.focus();
        if (e.key.length === 1) Els.input.value += e.key;
      }

      if (e.key === 'Enter') {
        e.preventDefault();
        // йҒҮеҲ° Enter дҝқз•ҷжҸӣиЎҢз¬ҰиҷҹдҪңзӮәеҲҶз•Ңй»һ
        if (isMobile) fallbackBuffer += '\n'; 
        else Els.input.value += '\n';
        
        clearTimeout(submitTimer);
        submitTimer = setTimeout(processScan, 30);
      } else if (e.key === 'Tab') {
        e.preventDefault();
        // йҒҮеҲ°е…§еөҢ Tab зӣҙжҺҘиҪүдёәз©әзҷҪ
        if (isMobile) fallbackBuffer += ' '; 
        else Els.input.value += ' ';
        
        clearTimeout(submitTimer);
        submitTimer = setTimeout(processScan, 30);
      } else {
        clearTimeout(submitTimer);
        if (isMobile && e.key.length === 1) fallbackBuffer += e.key;
      }
    });

    if (!isMobile) {
      document.addEventListener('click', e => {
        if (e.target.tagName === 'BUTTON' || e.target.closest('button') || e.target.closest('.lang-dropdown')) return;
        if (Els.alertView.classList.contains('hidden')) Els.input.focus();
      });
      Els.input.focus();
    }
    applyLang(currentLang);
  </script>
</body>
</html>
